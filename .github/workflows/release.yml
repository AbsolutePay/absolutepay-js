name: Release

# Publishes to npm ONLY when a GitHub Release is published (or via manual dispatch after review).
# Never runs on a push. Auth = npm Trusted Publisher (OIDC) — NO NPM_TOKEN secret needed.
# Configure on npmjs → package → Trusted Publisher: Org=AbsolutePay, Repo=absolutepay-js, Workflow=release.yml.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC: lets npm verify this workflow as the trusted publisher

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run gen:check
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 22 ships an older npm, so upgrade first.
      - run: npm install -g npm@latest
      # No token — npm authenticates via the GitHub OIDC trusted publisher.
      # Public repo → attach provenance (verifiable build → package supply-chain link).
      - name: Publish to npm (OIDC trusted publisher)
        run: npm publish --access public --provenance
